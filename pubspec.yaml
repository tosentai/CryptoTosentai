name: crypto_tosentai
description: "CryptoTosentai — premium fintech crypto portfolio tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Networking
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI / UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Avatar
  image_picker: ^1.1.2

  # App info
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.1

  # Localization
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
